<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Caldas Cup Fut7</title>

  <meta name="theme-color" content="#031521">
  <meta name="application-name" content="Caldas Cup Fut7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Caldas Cup">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">

  <style>
    :root{
      --bg:#031521;
      --bg2:#06283a;
      --blue:#28a9e0;
      --cyan:#5cd6d6;
      --gold:#f4c430;
      --gold2:#ffdf6b;
      --text:#eef4f8;
      --muted:#a9c3d1;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      font-family:Arial,Helvetica,sans-serif;
    }

    #app{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      opacity:0;
      background:var(--bg);
      transition:opacity .65s ease;
    }

    #app.visivel{opacity:1}

    #splash{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:
        calc(20px + env(safe-area-inset-top,0px))
        18px
        calc(20px + env(safe-area-inset-bottom,0px));

      background:
        radial-gradient(circle at 50% 30%,rgba(40,169,224,.22),transparent 28%),
        radial-gradient(circle at 50% 72%,rgba(244,196,48,.09),transparent 34%),
        linear-gradient(155deg,#02111a 0%,#06283a 50%,#031521 100%);

      color:var(--text);
      transition:opacity .75s ease,visibility .75s ease;
    }

    #splash.saindo{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .conteudo{
      width:min(94vw,480px);
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      position:relative;
      z-index:2;
      animation:entrada .9s cubic-bezier(.2,.8,.2,1) both;
    }

    .universo{
      position:relative;
      width:320px;
      height:320px;
      margin-bottom:18px;
      display:grid;
      place-items:center;
      perspective:1200px;
    }

    .halo{
      position:absolute;
      width:250px;
      height:250px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(40,169,224,.30),rgba(40,169,224,.08) 46%,transparent 72%);
      filter:blur(18px);
      animation:pulsar 2.8s ease-in-out infinite;
    }

    .bola{
      position:relative;
      width:232px;
      height:232px;
      border-radius:50%;
      overflow:hidden;
      display:grid;
      place-items:center;
      transform-style:preserve-3d;

      background:
        radial-gradient(circle at 34% 27%,rgba(255,255,255,.96),transparent 13%),
        radial-gradient(circle at 50% 42%,#f8fafb 0 30%,#d5dde2 50%,#96a7b2 74%,#314651 100%);

      box-shadow:
        inset -36px -30px 54px rgba(0,0,0,.40),
        inset 22px 16px 30px rgba(255,255,255,.28),
        0 28px 46px rgba(0,0,0,.46),
        0 0 42px rgba(40,169,224,.34);

      animation:bolaFlutua 3.2s ease-in-out infinite;
    }

    .textura{
      position:absolute;
      inset:-34%;
      border-radius:50%;
      background:
        radial-gradient(circle at 20% 28%,#111 0 6%,transparent 6.5%),
        radial-gradient(circle at 56% 18%,#111 0 6%,transparent 6.5%),
        radial-gradient(circle at 78% 45%,#111 0 6%,transparent 6.5%),
        radial-gradient(circle at 43% 66%,#111 0 6%,transparent 6.5%),
        radial-gradient(circle at 18% 76%,#111 0 6%,transparent 6.5%),
        radial-gradient(circle at 73% 82%,#111 0 6%,transparent 6.5%),
        repeating-radial-gradient(circle at 50% 50%,transparent 0 25px,rgba(4,17,26,.18) 26px,transparent 28px 46px);
      opacity:.70;
      animation:texturaGira 5.2s linear infinite;
    }

    .sombra-esfera{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        linear-gradient(90deg,rgba(255,255,255,.20),transparent 30%,rgba(0,0,0,.26)),
        radial-gradient(circle at 32% 24%,rgba(255,255,255,.42),transparent 18%);
      z-index:2;
      pointer-events:none;
    }

    .logo{
      position:relative;
      z-index:5;
      width:164px;
      height:164px;
      border-radius:50%;
      overflow:hidden;
      display:grid;
      place-items:center;
      background:#fff;
      border:4px solid rgba(255,255,255,.68);
      box-shadow:
        0 0 0 7px rgba(40,169,224,.22),
        0 0 30px rgba(244,196,48,.30);
      animation:logoPulsa 2.6s ease-in-out infinite;
    }

    .logo img{
      width:176px;
      height:176px;
      object-fit:contain;
      transform:scale(1.08);
    }

    .orbita{
      position:absolute;
      border-radius:50%;
      border:3px solid transparent;
      pointer-events:none;
    }

    .orbita.azul{
      width:294px;
      height:128px;
      border-top-color:rgba(92,214,214,.95);
      border-bottom-color:rgba(40,169,224,.45);
      filter:drop-shadow(0 0 10px rgba(40,169,224,.85));
      animation:orbitaAzul 2.9s linear infinite;
    }

    .orbita.ouro{
      width:282px;
      height:144px;
      border-left-color:rgba(244,196,48,.95);
      border-right-color:rgba(244,196,48,.35);
      filter:drop-shadow(0 0 10px rgba(244,196,48,.70));
      animation:orbitaOuro 3.8s linear infinite reverse;
    }

    .orbita.vertical{
      width:136px;
      height:300px;
      border-left-color:rgba(92,214,214,.82);
      border-right-color:rgba(244,196,48,.72);
      filter:drop-shadow(0 0 9px rgba(40,169,224,.55));
      animation:orbitaVertical 4.4s linear infinite;
    }

    .rastro{
      position:absolute;
      width:270px;
      height:270px;
      border-radius:50%;
      background:
        conic-gradient(
          from 0deg,
          transparent 0 16%,
          rgba(92,214,214,.68) 19%,
          transparent 24% 54%,
          rgba(244,196,48,.72) 59%,
          transparent 66% 100%
        );
      filter:blur(8px);
      opacity:.78;
      animation:rastroGira 3.2s linear infinite;
    }

    .mini{
      color:var(--gold2);
      font-size:11px;
      font-weight:800;
      letter-spacing:.34em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .titulo{
      margin:0;
      font-size:clamp(36px,9vw,50px);
      line-height:1;
      font-weight:900;
      letter-spacing:.055em;
      text-shadow:0 10px 28px rgba(0,0,0,.36);
    }

    .titulo span{color:var(--gold)}

    .sub{
      margin:14px 0 24px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.17em;
      text-transform:uppercase;
      line-height:1.6;
    }

    .barra{
      width:min(78vw,320px);
      height:8px;
      overflow:hidden;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(40,169,224,.34);
      box-shadow:inset 0 1px 3px rgba(0,0,0,.46),0 0 18px rgba(40,169,224,.14);
    }

    .barra span{
      display:block;
      width:38%;
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),#fff3b0,transparent);
      box-shadow:0 0 16px rgba(244,196,48,.95);
      animation:carregar 1.35s ease-in-out infinite;
    }

    .status{
      min-height:20px;
      margin-top:14px;
      color:#dbe8ee;
      font-size:12px;
      letter-spacing:.08em;
    }

    .status::after{
      content:"";
      animation:pontos 1.25s steps(4,end) infinite;
    }

    #fallback{
      display:none;
      width:min(86vw,360px);
      margin-top:18px;
      padding-top:16px;
      border-top:1px solid rgba(255,255,255,.10);
    }

    #fallback p{
      margin:0 0 13px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    #abrirDireto{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:12px 22px;
      border-radius:12px;
      background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#071c29;
      font-size:14px;
      font-weight:800;
      text-decoration:none;
      box-shadow:0 10px 28px rgba(244,196,48,.20);
    }

    @keyframes entrada{
      from{opacity:0;transform:translateY(18px) scale(.97)}
      to{opacity:1;transform:none}
    }

    @keyframes bolaFlutua{
      0%,100%{transform:translateY(0) rotateY(-8deg) rotateX(3deg)}
      50%{transform:translateY(-10px) rotateY(8deg) rotateX(-3deg)}
    }

    @keyframes texturaGira{
      to{transform:rotate(360deg)}
    }

    @keyframes logoPulsa{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.035)}
    }

    @keyframes orbitaAzul{
      to{transform:rotate(360deg)}
    }

    @keyframes orbitaOuro{
      to{transform:rotate(360deg)}
    }

    @keyframes orbitaVertical{
      to{transform:rotate(360deg)}
    }

    @keyframes rastroGira{
      to{transform:rotate(360deg)}
    }

    @keyframes pulsar{
      0%,100%{transform:scale(.94);opacity:.62}
      50%{transform:scale(1.08);opacity:1}
    }

    @keyframes carregar{
      0%{transform:translateX(-135%)}
      100%{transform:translateX(375%)}
    }

    @keyframes pontos{
      0%{content:""}
      25%{content:"."}
      50%{content:".."}
      75%,100%{content:"..."}
    }

    @media(max-height:680px){
      .universo{
        width:244px;
        height:244px;
        margin-bottom:10px;
      }

      .bola{
        width:180px;
        height:180px;
      }

      .logo{
        width:126px;
        height:126px;
      }

      .logo img{
        width:136px;
        height:136px;
      }

      .orbita.azul{width:226px;height:96px}
      .orbita.ouro{width:216px;height:108px}
      .orbita.vertical{width:104px;height:232px}
      .rastro{width:206px;height:206px}

      .titulo{font-size:34px}
      .sub{margin:9px 0 16px}
    }
  </style>
</head>

<body>
  <div id="splash" aria-live="polite">
    <div class="conteudo">

      <div class="universo">
        <div class="halo"></div>
        <div class="rastro"></div>
        <div class="orbita azul"></div>
        <div class="orbita ouro"></div>
        <div class="orbita vertical"></div>

        <div class="bola">
          <div class="textura"></div>

          <div class="logo">
            <img src="./icon.png" alt="Caldas Cup Fut7">
          </div>

          <div class="sombra-esfera"></div>
        </div>
      </div>

      <div class="mini">Painel de Controle</div>

      <h1 class="titulo">
        CALDAS <span>CUP</span>
      </h1>

      <div class="sub">
        Fut7 · Equipes · Hospedagem · Financeiro
      </div>

      <div class="barra"><span></span></div>

      <div class="status" id="status">Carregando sistema</div>

      <div id="fallback">
        <p>O sistema está demorando mais que o esperado para abrir.</p>

        <a
          id="abrirDireto"
          href="https://script.google.com/macros/s/AKfycbyIQ4QRv-AQlJxc2_L7Az6agwEBaB70ttV_UL0bH4gCRnn_tQ21UVm4gspdk01GsYRZ/exec"
          target="_top"
          rel="noopener"
        >
          ABRIR SISTEMA
        </a>
      </div>

    </div>
  </div>

  <iframe
    id="app"
    title="Sistema Caldas Cup Fut7"
    src="https://script.google.com/macros/s/AKfycbyIQ4QRv-AQlJxc2_L7Az6agwEBaB70ttV_UL0bH4gCRnn_tQ21UVm4gspdk01GsYRZ/exec"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script>
    const splash = document.getElementById('splash');
    const iframe = document.getElementById('app');
    const fallback = document.getElementById('fallback');
    const status = document.getElementById('status');

    const inicio = Date.now();
    const TEMPO_MINIMO_SPLASH = 3000;
    const TEMPO_LIMITE = 15000;

    let iframeCarregado = false;
    let splashEncerrada = false;

    function encerrarSplash(){
      if(splashEncerrada) return;

      const decorrido = Date.now() - inicio;
      const restante = Math.max(0,TEMPO_MINIMO_SPLASH - decorrido);

      window.setTimeout(function(){
        splashEncerrada = true;
        status.textContent = 'Sistema pronto';
        iframe.classList.add('visivel');
        splash.classList.add('saindo');

        window.setTimeout(function(){
          splash.style.display = 'none';
        },800);
      },restante);
    }

    iframe.addEventListener('load',function(){
      iframeCarregado = true;
      encerrarSplash();
    });

    window.setTimeout(function(){
      if(iframeCarregado || splashEncerrada) return;

      status.textContent = 'Ainda carregando';
      fallback.style.display = 'block';
    },TEMPO_LIMITE);
  </script>
</body>
</html>
