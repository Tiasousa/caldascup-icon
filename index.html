<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Caldas Cup Fut7 - Painel de Controle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#0a2635">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Caldas Cup">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-950:#071c29; --bg-900:#0a2635; --surface-2:#123a52; --line:#1f5674;
      --muted:#8fb4c9; --muted-dim:#5c8298;
      --brand-blue:#28a9e0; --gold:#f4c430; --gold-soft:#ffdb6b;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;height:100%;background:var(--bg-950);font-family:'Inter',Arial,sans-serif;}

    #splash{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(ellipse at 50% 35%,#123a52 0%,#0a2635 45%,#071c29 100%);
    }
    .splash-conteudo{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px;}
    .splash-conteudo>*{opacity:0;animation:splashSubir .7s ease forwards;}
    .splash-bola-wrap{animation-delay:.05s;}
    .splash-marca{animation-delay:.25s;}
    .splash-tagline{animation-delay:.42s;}
    .splash-barra{animation-delay:.56s;}
    .splash-status{animation-delay:.66s;}
    @keyframes splashSubir{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

    .splash-bola-wrap{position:relative;width:220px;height:220px;margin-bottom:30px;display:flex;align-items:center;justify-content:center;}
    .splash-anel{position:absolute;inset:0;width:100%;height:100%;}
    .anel-pontilhado{transform-box:fill-box;transform-origin:center;animation:splashGirar 10s linear infinite;}
    .anel-arco{transform-box:fill-box;transform-origin:center;animation:splashGirar 1.6s linear infinite;}
    @keyframes splashGirar{to{transform:rotate(360deg);}}
    .splash-bola{
      position:relative;width:150px;height:150px;border-radius:50%;z-index:2;
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,.9), rgba(255,255,255,.15) 38%, transparent 55%),
        radial-gradient(circle at 68% 72%, rgba(0,0,0,.35), transparent 55%),
        linear-gradient(135deg,#f4f7fa,#d7dee6);
      box-shadow:0 0 34px rgba(40,169,224,.45), 0 0 70px rgba(244,196,48,.18), inset 0 0 30px rgba(0,0,0,.25);
      display:flex;align-items:center;justify-content:center;overflow:hidden;
      animation:splashPulsa 3.4s ease-in-out infinite;
    }
    .splash-bola::before{
      content:"";position:absolute;inset:0;opacity:.5;
      background-image:
        radial-gradient(circle at 50% 14%, transparent 13%, #1c2733 13.5% 15%, transparent 15.5%),
        radial-gradient(circle at 18% 40%, transparent 13%, #1c2733 13.5% 15%, transparent 15.5%),
        radial-gradient(circle at 82% 40%, transparent 13%, #1c2733 13.5% 15%, transparent 15.5%),
        radial-gradient(circle at 32% 78%, transparent 13%, #1c2733 13.5% 15%, transparent 15.5%),
        radial-gradient(circle at 68% 78%, transparent 13%, #1c2733 13.5% 15%, transparent 15.5%);
    }
    @keyframes splashPulsa{0%,100%{filter:drop-shadow(0 0 10px rgba(40,169,224,.4));}50%{filter:drop-shadow(0 0 20px rgba(244,196,48,.5));}}
    .splash-escudo{
      position:relative;z-index:3;width:104px;height:104px;border-radius:50%;
      object-fit:cover;object-position:center 38%;background:#0a2635;
      box-shadow:0 3px 10px rgba(0,0,0,.5), inset 0 0 0 3px rgba(244,196,48,.55);
    }

    .splash-marca{display:flex;flex-direction:column;align-items:center;gap:2px;}
    .splash-rotulo{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-soft);}
    .splash-titulo{font-family:'Oswald';font-weight:700;font-size:38px;letter-spacing:.02em;line-height:1;margin-top:6px;color:#fff;}
    .splash-titulo .gold{color:var(--gold);}
    .splash-sub{margin-top:8px;display:flex;align-items:center;gap:12px;color:var(--brand-blue);font-family:'Oswald';font-weight:600;font-size:17px;letter-spacing:.12em;}
    .splash-sub::before,.splash-sub::after{content:"";width:52px;height:1px;background:linear-gradient(90deg,transparent,var(--line));}
    .splash-sub::after{background:linear-gradient(90deg,var(--line),transparent);}
    .splash-tagline{margin-top:20px;font-size:12px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;}
    .splash-barra{margin-top:22px;width:min(320px,72vw);height:5px;background:var(--surface-2);border-radius:999px;overflow:hidden;}
    .splash-barra-fill{height:100%;width:30%;border-radius:999px;background:linear-gradient(90deg,transparent,var(--brand-blue) 35%,var(--gold-soft) 65%,transparent);animation:splashDesliza 1.4s ease-in-out infinite;}
    @keyframes splashDesliza{0%{transform:translateX(-140%);}100%{transform:translateX(440%);}}
    .splash-status{margin-top:12px;font-size:12.5px;color:var(--muted-dim);}
    .splash-link{margin-top:10px;font-size:12px;}
    .splash-link a{color:var(--gold-soft);}

    @media(max-width:640px){
      .splash-bola-wrap{width:170px;height:170px;}
      .splash-bola{width:118px;height:118px;}
      .splash-escudo{width:76px;height:76px;}
      .splash-titulo{font-size:29px;}
      .splash-sub{font-size:14px;}
      .splash-sub::before,.splash-sub::after{width:32px;}
    }
  </style>
  <script>
    // redireciona a página inteira pro painel de verdade (sem iframe — evita bloqueio de cookies do Safari/iOS)
    setTimeout(function(){
      window.location.replace("https://script.google.com/macros/s/AKfycbyIQ4QRv-AQlJxc2_L7Az6agwEBaB70ttV_UL0bH4gCRnn_tQ21UVm4gspdk01GsYRZ/exec");
    }, 1400);
  </script>
</head>
<body>
  <div id="splash">
    <div class="splash-conteudo">
      <div class="splash-bola-wrap">
        <svg class="splash-anel" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="splashAnelGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#a7e6f9"/>
              <stop offset=".5" stop-color="#28a9e0"/>
              <stop offset="1" stop-color="#f4c430"/>
            </linearGradient>
          </defs>
          <circle cx="110" cy="110" r="103" fill="none" stroke="rgba(40,169,224,.14)" stroke-width="1.4"/>
          <circle class="anel-pontilhado" cx="110" cy="110" r="103" fill="none" stroke="url(#splashAnelGrad)" stroke-width="5" stroke-dasharray="3 11"/>
          <circle class="anel-arco" cx="110" cy="110" r="91" fill="none" stroke="#f4c430" stroke-width="3" stroke-linecap="round" stroke-dasharray="66 350"/>
        </svg>
        <div class="splash-bola">
          <img class="splash-escudo" src="icon.png" alt="Caldas Cup">
        </div>
      </div>
      <div class="splash-marca">
        <div class="splash-rotulo">Painel de Controle</div>
        <div class="splash-titulo">CALDAS <span class="gold">CUP</span></div>
        <div class="splash-sub">FUT7</div>
      </div>
      <div class="splash-tagline">Equipes · Hospedagem · Financeiro</div>
      <div class="splash-barra"><div class="splash-barra-fill"></div></div>
      <div class="splash-status">Abrindo o painel...</div>
      <div class="splash-link"><a href="https://script.google.com/macros/s/AKfycbyIQ4QRv-AQlJxc2_L7Az6agwEBaB70ttV_UL0bH4gCRnn_tQ21UVm4gspdk01GsYRZ/exec">Não abriu? Toque aqui</a></div>
    </div>
  </div>
</body>
</html>
