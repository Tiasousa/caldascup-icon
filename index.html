<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Caldas Cup Fut7</title>

  <meta name="theme-color" content="#071c29">
  <meta name="application-name" content="Caldas Cup Fut7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Caldas Cup">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">

  <style>
    :root {
      --bg:#031521;
      --bg2:#07283a;
      --blue:#28a9e0;
      --cyan:#5cd6d6;
      --gold:#f4c430;
      --gold2:#ffdf6b;
      --text:#eef4f8;
      --muted:#a9c3d1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
      opacity: 0;
      transition: opacity .55s ease;
    }

    #app.visivel {
      opacity: 1;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding:
        calc(24px + env(safe-area-inset-top, 0px))
        22px
        calc(24px + env(safe-area-inset-bottom, 0px));

      background:
        radial-gradient(circle at 50% 36%, rgba(40,169,224,.22), transparent 28%),
        radial-gradient(circle at 50% 58%, rgba(244,196,48,.07), transparent 38%),
        linear-gradient(150deg, #02111a 0%, #062436 48%, #031521 100%);

      color: var(--text);
      transition: opacity .6s ease, visibility .6s ease;
    }

    #splash.saindo {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .conteudo {
      position: relative;
      width: min(94vw, 460px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 3;
      animation: entrada .9s cubic-bezier(.2,.8,.2,1) both;
    }

    /* ESFERA 3D */
    .esfera {
      position: relative;
      width: 260px;
      height: 260px;
      margin-bottom: 24px;
      perspective: 900px;
      display: grid;
      place-items: center;
    }

    .bola {
      position: relative;
      width: 214px;
      height: 214px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      transform-style: preserve-3d;

      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,.34), transparent 18%),
        radial-gradient(circle at 50% 56%, rgba(40,169,224,.14), transparent 48%),
        linear-gradient(145deg, #0a3148, #041a28 68%, #02111a);

      border: 1px solid rgba(92,214,214,.28);

      box-shadow:
        inset -28px -24px 42px rgba(0,0,0,.48),
        inset 18px 14px 28px rgba(255,255,255,.06),
        0 0 34px rgba(40,169,224,.32),
        0 0 70px rgba(40,169,224,.14);

      animation: esferaRespira 2.8s ease-in-out infinite;
    }

    .bola::before {
      content: "";
      position: absolute;
      inset: -30%;
      border-radius: 50%;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 18px,
          rgba(92,214,214,.12) 19px,
          transparent 20px 38px
        );
      opacity: .55;
      transform: rotateY(0deg);
      animation: texturaGira 4.8s linear infinite;
    }

    .bola::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 25%, rgba(255,255,255,.23), transparent 20%),
        linear-gradient(90deg, rgba(255,255,255,.08), transparent 32%, rgba(0,0,0,.20));
      pointer-events: none;
    }

    .logo-mascara {
      position: relative;
      z-index: 5;
      width: 176px;
      height: 176px;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;

      background: #ffffff;

      box-shadow:
        0 0 0 4px rgba(255,255,255,.10),
        0 0 22px rgba(244,196,48,.18);

      animation: logoFlutua 2.6s ease-in-out infinite;
    }

    .logo-mascara img {
      width: 188px;
      height: 188px;
      object-fit: contain;
      transform: scale(1.12);
    }

    /* ANÉIS ORBITAIS */
    .orbita {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      pointer-events: none;
    }

    .orbita.azul {
      inset: 12px;
      border-top-color: rgba(92,214,214,.95);
      border-right-color: rgba(40,169,224,.35);
      transform: rotateX(70deg) rotateZ(12deg);
      box-shadow: 0 -2px 16px rgba(40,169,224,.55);
      animation: orbitaAzul 3.2s linear infinite;
    }

    .orbita.ouro {
      inset: 24px;
      border-bottom-color: rgba(244,196,48,.95);
      border-left-color: rgba(244,196,48,.30);
      transform: rotateX(66deg) rotateZ(-18deg);
      box-shadow: 0 2px 18px rgba(244,196,48,.45);
      animation: orbitaOuro 4.1s linear infinite reverse;
    }

    .orbita.vertical {
      inset: 5px 52px;
      border-left-color: rgba(92,214,214,.7);
      border-right-color: rgba(244,196,48,.55);
      transform: rotateY(68deg);
      animation: orbitaVertical 3.8s linear infinite;
    }

    .brilho {
      position: absolute;
      inset: 34px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0 18%,
        rgba(92,214,214,.65) 20%,
        transparent 25% 58%,
        rgba(244,196,48,.65) 62%,
        transparent 69% 100%
      );
      filter: blur(6px);
      opacity: .75;
      animation: brilhoGira 3s linear infinite;
    }

    .marca-menor {
      color: var(--gold2);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .32em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .marca {
      margin: 0;
      font-size: clamp(34px, 8vw, 47px);
      line-height: 1;
      letter-spacing: .05em;
      font-weight: 900;
      text-shadow: 0 9px 30px rgba(0,0,0,.35);
    }

    .marca span {
      color: var(--gold);
    }

    .subtitulo {
      margin: 13px 0 25px;
      max-width: 360px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      letter-spacing: .17em;
      text-transform: uppercase;
    }

    .progresso {
      width: min(78vw, 310px);
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(40,169,224,.28);
      box-shadow:
        inset 0 1px 3px rgba(0,0,0,.42),
        0 0 16px rgba(40,169,224,.12);
    }

    .progresso span {
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, transparent, var(--gold), var(--gold2), #fff3b0, transparent);
      box-shadow: 0 0 14px rgba(244,196,48,.9);
      animation: carregar 1.4s ease-in-out infinite;
    }

    .status {
      min-height: 20px;
      margin-top: 14px;
      color: #dbe8ee;
      font-size: 12px;
      letter-spacing: .08em;
    }

    .status::after {
      content: "";
      animation: pontos 1.25s steps(4, end) infinite;
    }

    #fallback {
      display: none;
      width: min(86vw, 360px);
      margin-top: 19px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,.10);
    }

    #fallback p {
      margin: 0 0 13px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    #abrirDireto {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 22px;
      border-radius: 12px;
      border: 1px solid var(--gold);
      background: linear-gradient(180deg, var(--gold2), var(--gold));
      color: #071c29;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(244,196,48,.20);
    }

    .luz-fundo {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(40,169,224,.10), transparent 62%);
      filter: blur(10px);
      animation: fundoPulsa 4s ease-in-out infinite;
    }

    @keyframes entrada {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.97);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes esferaRespira {
      0%, 100% { transform: scale(1) rotateY(-5deg); }
      50% { transform: scale(1.035) rotateY(5deg); }
    }

    @keyframes texturaGira {
      to { transform: rotate(360deg); }
    }

    @keyframes logoFlutua {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.015); }
    }

    @keyframes orbitaAzul {
      to { transform: rotateX(70deg) rotateZ(372deg); }
    }

    @keyframes orbitaOuro {
      to { transform: rotateX(66deg) rotateZ(342deg); }
    }

    @keyframes orbitaVertical {
      to { transform: rotateY(68deg) rotateZ(360deg); }
    }

    @keyframes brilhoGira {
      to { transform: rotate(360deg); }
    }

    @keyframes carregar {
      0% { transform: translateX(-135%); }
      100% { transform: translateX(375%); }
    }

    @keyframes pontos {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75%, 100% { content: "..."; }
    }

    @keyframes fundoPulsa {
      0%, 100% { transform: scale(.92); opacity: .65; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @media (max-height: 650px) {
      .esfera {
        width: 205px;
        height: 205px;
        margin-bottom: 14px;
      }

      .bola {
        width: 170px;
        height: 170px;
      }

      .logo-mascara {
        width: 138px;
        height: 138px;
      }

      .logo-mascara img {
        width: 148px;
        height: 148px;
      }

      .marca {
        font-size: 32px;
      }

      .subtitulo {
        margin: 9px 0 17px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>
  <div id="splash" aria-live="polite">
    <div class="luz-fundo"></div>

    <div class="conteudo">
      <div class="esfera">
        <div class="brilho"></div>
        <div class="orbita azul"></div>
        <div class="orbita ouro"></div>
        <div class="orbita vertical"></div>

        <div class="bola">
          <div class="logo-mascara">
            <img
              src="./icon.png"
              alt="Caldas Cup Fut7"
              onerror="this.style.display='none'"
            >
          </div>
        </div>
      </div>

      <div class="marca-menor">Painel de Controle</div>

      <h1 class="marca">
        CALDAS <span>CUP</span>
      </h1>

      <div class="subtitulo">
        Fut7 · Equipes · Hospedagem · Financeiro
      </div>

      <div class="progresso" aria-hidden="true">
        <span></span>
      </div>

      <div class="status" id="status">Carregando sistema</div>

      <div id="fallback">
        <p>
          O sistema está demorando mais que o esperado para abrir.
        </p>

        <a
          id="abrirDireto"
          href="https://script.google.com/macros/s/AKfycbyIQ4QRv-AQlJxc2_L7Az6agwEBaB70ttV_UL0bH4gCRnn_tQ21UVm4gspdk01GsYRZ/exec"
          target="_top"
          rel="noopener"
        >
          ABRIR SISTEMA
        </a>
      </div>
    </div>
  </div>

  <iframe
    id="app"
    title="Sistema Caldas Cup Fut7"
    src="https://script.google.com/macros/s/AKfycbyIQ4QRv-AQlJxc2_L7Az6agwEBaB70ttV_UL0bH4gCRnn_tQ21UVm4gspdk01GsYRZ/exec"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script>
    const splash = document.getElementById('splash');
    const iframe = document.getElementById('app');
    const fallback = document.getElementById('fallback');
    const status = document.getElementById('status');

    const inicio = Date.now();
    const TEMPO_MINIMO_SPLASH = 2600;
    const TEMPO_LIMITE = 15000;

    let iframeCarregado = false;
    let splashEncerrada = false;

    function encerrarSplash() {
      if (splashEncerrada) return;

      const decorrido = Date.now() - inicio;
      const restante = Math.max(0, TEMPO_MINIMO_SPLASH - decorrido);

      window.setTimeout(function () {
        splashEncerrada = true;
        status.textContent = 'Sistema pronto';
        iframe.classList.add('visivel');
        splash.classList.add('saindo');

        window.setTimeout(function () {
          splash.style.display = 'none';
        }, 650);
      }, restante);
    }

    iframe.addEventListener('load', function () {
      iframeCarregado = true;
      encerrarSplash();
    });

    window.setTimeout(function () {
      if (iframeCarregado || splashEncerrada) return;

      status.textContent = 'Ainda carregando';
      fallback.style.display = 'block';
    }, TEMPO_LIMITE);
  </script>
</body>
</html>
